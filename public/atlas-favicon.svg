<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Atlas — Favicon</title>
  <defs>
    <clipPath id="fav-clip">
      <circle cx="256" cy="248" r="220"></circle>
    </clipPath>
    <radialGradient id="fav-fill" cx="36%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#2D3250"></stop>
      <stop offset="55%" stop-color="#1A1F38"></stop>
      <stop offset="100%" stop-color="#0D0F1E"></stop>
    </radialGradient>
    <radialGradient id="fav-gloss" cx="32%" cy="20%" r="52%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"></stop>
      <stop offset="45%" stop-color="white" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="fav-rim" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="transparent"></stop>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"></stop>
    </radialGradient>
    <filter id="fav-shadow">
      <feGaussianBlur stdDeviation="18"></feGaussianBlur>
    </filter>
  </defs>

  <!-- White background — misma geometría que Night (rx=110) -->
  <rect width="512" height="512" rx="110" fill="#FFFFFF"></rect>
  <!-- Borde sutil de contención -->
  <rect x="1" y="1" width="510" height="510" rx="109.5" fill="none" stroke="#E5E7EB" stroke-width="2"></rect>

  <!-- Sombra flotante -->
  <ellipse cx="256" cy="295" rx="200" ry="28" fill="rgba(0,0,0,0.12)" filter="url(#fav-shadow)"></ellipse>

  <!-- Esfera -->
  <circle cx="256" cy="248" r="220" fill="url(#fav-fill)"></circle>

  <!-- Patrón balón — misma geometría que Night -->
  <g clip-path="url(#fav-clip)">
    <polygon points="256,154 340,212 309,311 203,311 172,212" fill="#252840"></polygon>
    <polygon points="256,-2 307,35 285,96 227,96 205,35" fill="#252840"></polygon>
    <polygon points="484,152 466,204 408,210 386,162 420,122" fill="#252840"></polygon>
    <polygon points="424,448 368,462 334,418 354,370 410,368" fill="#252840"></polygon>
    <polygon points="88,448 50,392 90,352 146,368 158,418" fill="#252840"></polygon>
    <polygon points="28,152 64,122 106,162 84,210 26,204" fill="#252840"></polygon>
    <line x1="256" y1="154" x2="256" y2="96" stroke="#3D4466" stroke-width="9" stroke-linecap="round"></line>
    <line x1="256" y1="96" x2="285" y2="96" stroke="#3D4466" stroke-width="9" stroke-linecap="round"></line>
    <line x1="256" y1="96" x2="227" y2="96" stroke="#3D4466" stroke-width="9" stroke-linecap="round"></line>
    <path d="M 340 212 C 370 208 395 198 408 210" stroke="#3D4466" stroke-width="9" fill="none" stroke-linecap="round"></path>
    <path d="M 309 311 C 330 335 342 360 354 370" stroke="#3D4466" stroke-width="9" fill="none" stroke-linecap="round"></path>
    <path d="M 203 311 C 182 335 170 360 158 370" stroke="#3D4466" stroke-width="9" fill="none" stroke-linecap="round"></path>
    <path d="M 172 212 C 142 208 117 198 106 162" stroke="#3D4466" stroke-width="9" fill="none" stroke-linecap="round"></path>
    <path d="M 420 122 C 380 86  307 35  307 35" stroke="#3D4466" stroke-width="8" fill="none" stroke-linecap="round"></path>
    <path d="M 205 35  C 134 66  64  122 64  122" stroke="#3D4466" stroke-width="8" fill="none" stroke-linecap="round"></path>
    <path d="M 466 204 C 452 300 410 368 410 368" stroke="#3D4466" stroke-width="8" fill="none" stroke-linecap="round"></path>
    <path d="M 424 448 C 330 488 90  474 50  392" stroke="#3D4466" stroke-width="8" fill="none" stroke-linecap="round"></path>
    <path d="M 90  352 C 46  280 26  204 26  204" stroke="#3D4466" stroke-width="8" fill="none" stroke-linecap="round"></path>
  </g>

  <!-- Rim oscuro + gloss -->
  <circle cx="256" cy="248" r="220" fill="url(#fav-rim)"></circle>
  <circle cx="256" cy="248" r="220" fill="url(#fav-gloss)"></circle>

  <!-- Letra A -->
  <text x="256" y="244" text-anchor="middle" dominant-baseline="central"
        font-family="'Barlow Condensed','Arial Black',Impact,sans-serif"
        font-weight="900" font-size="200" letter-spacing="0" fill="#F97316">A</text>
</svg>
